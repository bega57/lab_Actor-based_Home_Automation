syntax = "proto3";

option java_multiple_files = true;
option java_package = "at.fhv.sysarch.lab2.homeautomation.grpcdemo";
option java_outer_classname = "OrderProto";

service OrderService {
  rpc OrderProduct (OrderRequest) returns (OrderResponse);
}

// Request carries the unit price so the processor can compute the total
message OrderRequest {
  string name   = 1;
  int32  amount = 2;
  double price  = 3;   // unit price per item
}

// Structured receipt returned after a successful (or failed) order
message OrderResponse {
  bool   success = 1;
  string message = 2;
  string product = 3;
  int32  amount  = 4;
  double price   = 5;
  double total   = 6;
}
